<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Quét QR 2026 - Toàn Màn Hình</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* 1. ÉP TOÀN BỘ TRANG TRÀN VIỀN */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        /* 2. ÉP CAMERA CHIẾM 100% - KHÔNG CÒN VÙNG ĐEN */
        #reader { 
            width: 100% !important; 
            height: 100% !important; 
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        /* Quan trọng nhất: Ép cái video bên trong tràn ra */
        #reader video { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: cover !important; 
        }

        /* 3. NÚT ĐÓNG & STATUS */
        .close-btn { 
            position: fixed; top: 15px; left: 15px; width: 42px; height: 42px; 
            background: rgba(220, 53, 69, 0.9); color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 26px; z-index: 1001; cursor: pointer; border: 2px solid #fff;
        }
        .status-top { 
            position: fixed; top: 20px; left: 75px; background: rgba(0,0,0,0.6); 
            padding: 6px 15px; border-radius: 20px; font-size: 12px; color: #00ff00; 
            z-index: 1000; border: 1px solid #00ff00; backdrop-filter: blur(4px);
        }

        /* 4. THANH TRƯỢT DỌC BÊN PHẢI */
        .config-panel {
            position: fixed; right: 10px; top: 50%; transform: translateY(-50%);
            width: 50px; background: rgba(0,0,0,0.6); 
            padding: 20px 5px; border-radius: 25px; z-index: 1000; border: 1px solid #00ff00;
            text-align: center; backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center;
        }
        .config-panel label { 
            font-size: 10px; color: #00ff00; margin-bottom: 15px; 
            font-weight: bold; text-transform: uppercase; writing-mode: vertical-rl;
        }
        #zoom-range { -webkit-appearance: slider-vertical; width: 28px; height: 200px; cursor: pointer; }

        /* 5. BOX KẾT QUẢ */
        #result-box { 
            position: fixed; bottom: 25px; width: 90%; left: 5%; padding: 18px; 
            background: rgba(20, 20, 20, 0.95); border-radius: 18px; 
            display: none; border: 1px solid #00ff00; z-index: 1002;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.8);
        }
        #qr-text { word-break: break-all; color: #00ff00; font-family: monospace; margin-bottom: 15px; font-size: 14px; max-height: 80px; overflow-y: auto; }
        .btn { background: #28a745; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="close-btn" onclick="justClose()">×</div>
    <div class="status-top" id="msg">ĐANG QUÉT...</div>

    <div class="config-panel">
        <label id="zoom-label">SIZE: 150PX</label>
        <input type="range" id="zoom-range" min="50" max="300" value="150" step="5">
    </div>

    <div id="reader"></div>
    
    <div id="result-box">
        <div style="margin-bottom: 8px; font-weight: bold; font-size: 13px; color: #aaa;">DỮ LIỆU NHẬN DIỆN:</div>
        <div id="qr-text"></div>
        <button class="btn" onclick="copyAndClose()">ĐỒNG Ý & GỬI DỮ LIỆU</button>
    </div>

    <script>
        var html5QrCode = new Html5Qrcode("reader");
        var isScanning = false;

        var startCamera = function(boxSize) {
            var config = { 
                fps: 30, 
                qrbox: { width: boxSize, height: boxSize }
                // Không để aspectRatio để thư viện tự lấy khung hình tốt nhất từ camera
            };

            if (isScanning) {
                html5QrCode.stop().then(function() {
                    doStart(config);
                }).catch(function(err) { console.error(err); });
            } else {
                doStart(config);
            }
        };

        var doStart = function(config) {
            html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
                .then(function() {
                    isScanning = true;
                    document.getElementById('msg').innerText = "CAMERA ĐANG QUÉT";
                })
                .catch(function(err) {
                    document.getElementById('msg').innerText = "LỖI: " + err;
                });
        };

        var qrCodeSuccessCallback = function(decodedText, decodedResult) {
            if (navigator.vibrate) navigator.vibrate(100);
            html5QrCode.stop();
            isScanning = false;
            document.getElementById('msg').innerText = "XONG!";
            document.getElementById('qr-text').innerText = decodedText;
            document.getElementById('result-box').style.display = 'block';
            navigator.clipboard.writeText(decodedText).catch(function(){});
        };

        document.getElementById('zoom-range').addEventListener('change', function(e) {
            var newSize = parseInt(e.target.value);
            document.getElementById('zoom-label').innerText = "SIZE: " + newSize + "PX";
            startCamera(newSize);
        });

        // Khởi động
        startCamera(150);

        function justClose() {
            if (isScanning) {
                html5QrCode.stop().then(function() { window.close(); }).catch(function() { window.close(); });
            } else {
                window.close();
            }
        }

        function copyAndClose() {
            var text = document.getElementById('qr-text').innerText;
            if (window.opener) {
                window.opener.postMessage({ type: 'QR_SCAN_RESULT', data: text }, "*");
                document.getElementById('msg').innerText = "ĐANG TRUYỀN...";
            } else {
                window.close();
            }
        }

        window.addEventListener("message", function(event) {
            if (event.data && event.data.type === 'CLOSE_SCANNER') {
                window.close();
            }
        });
    </script>
</body>
</html>
