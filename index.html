<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Quét QR 2026 - Pro Guide</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; height: 100vh; }
        
        /* 1. GIỮ NGUYÊN VÙNG CAMERA CŨ ĐỂ KHÔNG MẤT BOX DÀI */
        #reader { width: 100%; height: 55%; position: relative; z-index: 1; border-bottom: 2px solid #333; }
        
        /* 2. VÙNG ĐEN PHÍA DƯỚI: BIẾN THÀNH BẢNG HƯỚNG DẪN */
        .guide-container {
            flex: 1; width: 100%; background: #000; 
            padding: 20px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 2;
        }
        .guide-box {
            border: 1px dashed #00ff00; padding: 15px; border-radius: 15px;
            width: 85%; background: rgba(0, 255, 0, 0.05);
        }
        .guide-box h4 { margin: 0 0 10px 0; color: #00ff00; font-size: 14px; text-transform: uppercase; text-align: center; }
        .guide-box ul { margin: 0; padding-left: 20px; font-size: 12px; color: #ccc; line-height: 1.6; }
        .guide-box li { margin-bottom: 5px; }

        /* 3. NÚT ĐÓNG & STATUS */
        .close-btn { 
            position: fixed; top: 15px; left: 15px; width: 40px; height: 40px; 
            background: rgba(220, 53, 69, 0.8); color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; z-index: 1001; cursor: pointer; border: 2px solid #fff;
        }
        .status-top { position: fixed; top: 20px; right: 70px; background: rgba(0,255,0,0.2); padding: 6px 15px; border-radius: 20px; font-size: 12px; color: #00ff00; z-index: 1000; border: 1px solid #00ff00; }

        /* 4. THANH TRƯỢT DỌC BÊN PHẢI */
        .config-panel {
            position: fixed; right: 10px; top: 25%; /* Đẩy lên cao để không vướng guide */
            width: 50px; background: rgba(0,0,0,0.6); 
            padding: 15px 5px; border-radius: 25px; z-index: 1000; border: 1px solid #00ff00;
            text-align: center; backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center;
        }
        .config-panel label { font-size: 9px; color: #00ff00; margin-bottom: 10px; font-weight: bold; writing-mode: vertical-rl; }
        #zoom-range { -webkit-appearance: slider-vertical; width: 20px; height: 150px; cursor: pointer; }

        /* 5. BOX KẾT QUẢ */
        #result-box { 
            position: fixed; bottom: 20px; width: 90%; padding: 15px; 
            background: rgba(25, 25, 25, 0.98); border-radius: 15px; 
            display: none; border: 1px solid #00ff00; z-index: 1002;
            box-shadow: 0 -5px 25px rgba(0,255,0,0.2);
        }
        #qr-text { word-break: break-all; color: #00ff00; font-family: monospace; margin-bottom: 15px; font-size: 14px; max-height: 80px; overflow-y: auto; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="close-btn" onclick="justClose()">×</div>
    <div class="status-top" id="msg">ĐANG QUÉT...</div>

    <div class="config-panel">
        <label id="zoom-label">SIZE: 150PX</label>
        <input type="range" id="zoom-range" min="50" max="300" value="150" step="5">
    </div>

    <div id="reader"></div>

    <div class="guide-container">
        <div class="guide-box">
            <h4>Hướng dẫn quét mã</h4>
            <ul>
                <li>Đặt mã QR vào giữa khung hình chữ nhật.</li>
                <li>Dùng <b>Thanh trượt bên phải</b> để phóng to khung nếu mã QR quá nhỏ hoặc khó lấy nét.</li>
                <li>Đảm bảo môi trường đủ ánh sáng để nhận diện nhanh nhất.</li>
                <li>Hệ thống hỗ trợ quét CCCD, Cavet và các loại thẻ nhựa.</li>
            </ul>
        </div>
    </div>
    
    <div id="result-box">
        <div style="margin-bottom: 8px; font-weight: bold; font-size: 13px; color: #888;">DỮ LIỆU:</div>
        <div id="qr-text"></div>
        <button class="btn" onclick="copyAndClose()">ĐỒNG Ý & GỬI DỮ LIỆU</button>
    </div>

    <script>
        var html5QrCode = new Html5Qrcode("reader");
        var isScanning = false;

        var startCamera = function(boxSize) {
            var config = { 
                fps: 30, 
                qrbox: { width: boxSize, height: boxSize }
            };

            if (isScanning) {
                html5QrCode.stop().then(function() {
                    doStart(config);
                }).catch(function(err) { console.error(err); });
            } else {
                doStart(config);
            }
        };

        var doStart = function(config) {
            html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
                .then(function() {
                    isScanning = true;
                    document.getElementById('msg').innerText = "CAMERA SẴN SÀNG";
                })
                .catch(function(err) {
                    document.getElementById('msg').innerText = "LỖI: " + err;
                });
        };

        var qrCodeSuccessCallback = function(decodedText, decodedResult) {
            if (navigator.vibrate) navigator.vibrate(100);
            html5QrCode.stop();
            isScanning = false;
            document.getElementById('qr-text').innerText = decodedText;
            document.getElementById('result-box').style.display = 'block';
            navigator.clipboard.writeText(decodedText).catch(function(){});
        };

        document.getElementById('zoom-range').addEventListener('change', function(e) {
            var newSize = parseInt(e.target.value);
            document.getElementById('zoom-label').innerText = "SIZE: " + newSize + "PX";
            startCamera(newSize);
        });

        startCamera(150);

        function justClose() {
            if (isScanning) {
                html5QrCode.stop().then(function() { window.close(); }).catch(function() { window.close(); });
            } else {
                window.close();
            }
        }

        function copyAndClose() {
            var text = document.getElementById('qr-text').innerText;
            if (window.opener) {
                window.opener.postMessage({ type: 'QR_SCAN_RESULT', data: text }, "*");
                document.getElementById('msg').innerText = "Đang gửi...";
            } else {
                window.close();
            }
        }

        window.addEventListener("message", function(event) {
            if (event.data && event.data.type === 'CLOSE_SCANNER') {
                window.close();
            }
        });
    </script>
</body>
</html>
