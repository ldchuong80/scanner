<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG QUÉT MÃ</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #reader { width: 100% !important; height: 100% !important; position: absolute; top: 0; left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
        /* Ô VUÔNG NHỎ 150px - GIÚP CAMERA LẤY NÉT MÃ QR NHỎ */
        .scan-box { width: 150px; height: 150px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); border-radius: 15px; position: relative; }
        .corner { position: absolute; width: 25px; height: 25px; border: 4px solid #00ff00; border-radius: 4px; }
        .top-left { top: 0; left: 0; border-right: none; border-bottom: none; }
        .top-right { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; }
        .bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; }
        
        #result-box { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; padding: 20px; border-radius: 20px 20px 0 0; display: none; z-index: 100; box-sizing: border-box; border-top: 1px solid #333; }
        #qr-text { color: #00ff00; font-family: monospace; font-size: 14px; word-break: break-all; margin-bottom: 20px; }
        .btn { background: #28a745; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 16px; width: 100%; cursor: pointer; font-weight: bold; }
        .msg-top { position: fixed; top: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 20; color: #00ff00; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="msg-top">ĐÃ KHÔI PHỤC CHẾ ĐỘ QUÉT SIÊU NHẠY</div>
    <div id="reader"></div>
    <div class="overlay"><div class="scan-box"><div class="corner top-left"></div><div class="corner top-right"></div><div class="corner bottom-left"></div><div class="corner bottom-right"></div></div></div>
    
    <div id="result-box">
        <div id="qr-text"></div>
        <button class="btn" onclick="copyAndClose()">ĐỒNG Ý & QUAY LẠI APP</button>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        
        // Cấu hình chuẩn giúp lấy nét tốt cho iPhone/Redmi
        const config = { 
            fps: 30, 
            qrbox: { width: 150, height: 150 }, 
            aspectRatio: 1.0 
        };

        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            // Chặn rung hoặc lặp lại khi đã quét trúng
            html5QrCode.pause(true); 
            document.getElementById('qr-text').innerText = decodedText;
            document.getElementById('result-box').style.display = 'block';
            
            // Tự động copy
            navigator.clipboard.writeText(decodedText);
        }).catch(err => {
            console.error(err);
        });

        function copyAndClose() {
            var text = document.getElementById('qr-text').innerText;
            if (window.opener) {
                window.opener.postMessage({ type: 'QR_SCAN_RESULT', data: text }, "*");
                setTimeout(() => { window.close(); }, 300);
            }
        }
    </script>
</body>
</html>
