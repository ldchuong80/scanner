<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Quét QR 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        /* Cấu hình khung quét nhỏ lại để dễ lấy nét mã QR tí hon */
        #reader { width: 100%; max-width: 500px; height: 100vh; }
        #result-box { 
            position: fixed; bottom: 20px; width: 90%; padding: 15px; 
            background: rgba(34, 34, 34, 0.95); border-radius: 15px; 
            display: none; border: 1px solid #444; z-index: 100;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        #qr-text { word-break: break-all; color: #00ff00; font-family: monospace; margin-bottom: 15px; font-size: 14px; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; width: 100%; cursor: pointer; font-weight: bold; }
        .status-top { position: fixed; top: 20px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; font-size: 13px; color: #aaa; z-index: 10; }
    </style>
</head>
<body>

    <div class="status-top" id="msg">Đang khởi động Camera...</div>
    <div id="reader"></div>
    
    <div id="result-box" id="resBox">
        <div style="margin-bottom: 8px; font-weight: bold; font-size: 13px;">DỮ LIỆU TRÍCH XUẤT:</div>
        <div id="qr-text"></div>
        <button class="btn" onclick="copyAndClose()">ĐỒNG Ý & QUAY LẠI APP</button>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        
        const qrCodeSuccessCallback = (decodedText, decodedResult) => {
            // Khi quét trúng:
            html5QrCode.stop(); 
            document.getElementById('msg').innerText = "✅ ĐÃ NHẬN DIỆN!";
            document.getElementById('qr-text').innerText = decodedText;
            document.getElementById('result-box').style.display = 'block';
            
            // Tự động copy vào bộ nhớ đệm
            navigator.clipboard.writeText(decodedText);
        };

        // CẤU HÌNH QUAN TRỌNG: Ô vuông nhỏ (150px) để ép Camera lấy nét xa
        const config = { 
            fps: 25, 
            qrbox: { width: 150, height: 150 }, // Thu nhỏ ô vuông lại cho mã QR thẻ thật
            aspectRatio: 1.0
        };

        // Khởi chạy camera sau
        html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
            .then(() => {
                document.getElementById('msg').innerText = "Hãy đưa mã QR nhỏ vào giữa khung vuông";
            })
            .catch(err => {
                document.getElementById('msg').innerText = "Lỗi: " + err;
            });

        function copyAndClose() {
            const text = document.getElementById('qr-text').innerText;
            if (window.opener) {
                window.opener.postMessage({ type: 'QR_SCAN_RESULT', data: text }, "*");
                setTimeout(() => { window.close(); }, 300);
            } else {
                alert("Đã nhận dữ liệu! Bạn hãy quay lại App.");
            }
        }
    </script>
</body>
</html>
