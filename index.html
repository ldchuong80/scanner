<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Quét QR 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        #reader { width: 100%; max-width: 500px; height: 100vh; }
        
        /* Nút Đóng (X) ở góc trên bên phải */
        .close-btn { 
            position: fixed; top: 15px; right: 15px; width: 35px; height: 35px; 
            background: rgba(255, 255, 255, 0.2); color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px; font-weight: bold; z-index: 1000; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
        }

        #result-box { 
            position: fixed; bottom: 20px; width: 90%; padding: 15px; 
            background: rgba(34, 34, 34, 0.95); border-radius: 15px; 
            display: none; border: 1px solid #444; z-index: 100;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        #qr-text { word-break: break-all; color: #00ff00; font-family: monospace; margin-bottom: 15px; font-size: 14px; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; width: 100%; cursor: pointer; font-weight: bold; }
        .status-top { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; font-size: 13px; color: #aaa; z-index: 10; }
    </style>
</head>
<body>

    <div class="close-btn" onclick="justClose()">×</div>

    <div class="status-top" id="msg">Đang khởi động Camera...</div>
    <div id="reader"></div>
    
    <div id="result-box">
        <div style="margin-bottom: 8px; font-weight: bold; font-size: 13px;">DỮ LIỆU TRÍCH XUẤT:</div>
        <div id="qr-text"></div>
        <button class="btn" onclick="copyAndClose()">ĐỒNG Ý & QUAY LẠI APP</button>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        
        const qrCodeSuccessCallback = (decodedText, decodedResult) => {
            html5QrCode.stop(); 
            document.getElementById('msg').innerText = "✅ ĐÃ NHẬN DIỆN!";
            document.getElementById('qr-text').innerText = decodedText;
            document.getElementById('result-box').style.display = 'block';
            
            // Tự động copy vào bộ nhớ đệm (vẫn giữ để hỗ trợ dán thủ công nếu cần)
            navigator.clipboard.writeText(decodedText).catch(() => {});
        };

        const config = { 
            fps: 25, 
            qrbox: { width: 150, height: 150 }, 
            aspectRatio: 1.0
        };

        html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
            .catch(err => { document.getElementById('msg').innerText = "Lỗi: " + err; });

        // HÀNH ĐỘNG 1: CHỈ ĐÓNG (Không làm gì cả)
        function justClose() {
            window.close();
        }

        // HÀNH ĐỘNG 2: ĐỒNG Ý (Gửi dữ liệu về để Alert và xử lý)
        function copyAndClose() 
        {
            const text = document.getElementById('qr-text').innerText;
            
            if (window.opener) {
                // 1. Bắn tin nhắn về cho cha trước
                window.opener.postMessage({ type: 'QR_SCAN_RESULT', data: text }, "*");
                
                // 2. Đợi 100-200ms để trình duyệt kịp xử lý việc gửi tin rồi mới đóng
                // Khoảng thời gian này mắt người không nhận ra nhưng đủ cho Chrome Android
                setTimeout(function() {
                    window.close();
                }, 150); 
            } else {
                // Dự phòng nếu mất opener
                navigator.clipboard.writeText(text).then(() => {
                    alert("Đã copy dữ liệu!");
                    window.close();
                });
            }
        }
    </script>
</body>
</html>
