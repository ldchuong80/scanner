<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        #reader { width: 100%; height: 100%; }
        #info { position: fixed; top: 20px; z-index: 10; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="info">Đang mở camera...</div>
    <div id="reader"></div>

    <script>
        var html5QrCode = new Html5Qrcode("reader");
        var config = { 
            fps: 20, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        };

        html5QrCode.start({ facingMode: "environment" }, config, 
            function(decodedText) {
                if (window.opener) {
                    // Bắn dữ liệu về trang Google Apps Script
                    window.opener.postMessage({ type: 'QR_SCAN_RESULT', data: decodedText }, "*");
                    document.getElementById('info').innerHTML = "Đã quét thành công!";
                    setTimeout(function() { window.close(); }, 600);
                } else {
                    alert("Kết quả: " + decodedText);
                }
            }
        ).then(() => {
            document.getElementById('info').innerHTML = "Hãy đưa mã QR vào khung vuông";
        }).catch(err => {
            document.getElementById('info').innerHTML = "Lỗi: " + err;
        });
    </script>
</body>
</html>
