<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG QUÉT MÃ CHUYÊN DỤNG</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #reader { width: 100% !important; height: 100% !important; position: absolute; top: 0; left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }
        /* Ô vuông 150x150 chuẩn ý bạn */
        .scan-box { width: 150px; height: 150px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); border-radius: 15px; position: relative; }
        .corner { position: absolute; width: 25px; height: 25px; border: 4px solid #00ff00; border-radius: 4px; }
        .top-left { top: 0; left: 0; border-right: none; border-bottom: none; }
        .top-right { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; }
        .bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; }
        
        #result-box { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; padding: 20px; border-radius: 20px 20px 0 0; display: none; z-index: 100; box-sizing: border-box; border-top: 1px solid #333; }
        #qr-text { color: #00ff00; font-family: monospace; font-size: 14px; word-break: break-all; margin-bottom: 20px; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; width: 100%; cursor: pointer; font-weight: bold; }
        .status { position: fixed; top: 20px; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; font-size: 12px; z-index: 20; }
    </style>
</head>
<body>
    <div class="status" id="msg">Đang mở Camera...</div>
    <div id="reader"></div>
    <div class="overlay"><div class="scan-box"><div class="corner top-left"></div><div class="corner top-right"></div><div class="corner bottom-left"></div><div class="corner bottom-right"></div></div></div>
    
    <div id="result-box">
        <div style="font-size: 13px; color: #888; margin-bottom: 10px;">DỮ LIỆU ĐÃ NHẬN:</div>
        <div id="qr-text"></div>
        <button class="btn" onclick="copyAndClose()">ĐỒNG Ý & QUAY LẠI APP</button>
    </div>

    <script>
        // Tự động đổi Favicon sang hình cái máy quét cho chuyên nghiệp
        var link = document.querySelector("link[rel~='icon']");
        if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
        link.href = 'https://cdn-icons-png.flaticon.com/512/3126/3126505.png';

        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 25, qrbox: { width: 150, height: 150 }, aspectRatio: 1.0 };

        html5QrCode.start({ facingMode: "environment" }, config, (text) => {
            html5QrCode.stop();
            document.getElementById('qr-text').innerText = text;
            document.getElementById('result-box').style.display = 'block';
            navigator.clipboard.writeText(text);
        }).then(() => { document.getElementById('msg').innerText = "Căn mã QR vào ô vuông"; });

        function copyAndClose() {
            if (window.opener) {
                window.opener.postMessage({ type: 'QR_SCAN_RESULT', data: document.getElementById('qr-text').innerText }, "*");
                setTimeout(() => { window.close(); }, 300);
            }
        }
    </script>
</body>
</html>
