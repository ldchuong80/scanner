<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Trình phát Video full màn hình ngầm */
        #reader { width: 100% !important; height: 100% !important; display: flex; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; border: none !important; }
        #reader__video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
        
        /* Hiệu ứng lớp mờ xung quanh (Overlay) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); /* Độ mờ xung quanh */ }
        
        /* Ô QUÉT SIÊU NHỎ VÀ VUÔNG (HÌNH CHỮ L) */
        .scan-box { 
            width: 150px; height: 150px; /* Nhỏ và vuông đúng ý bạn */ 
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); /* Tạo lớp mờ */
            border-radius: 20px;
            position: relative;
        }
        
        /* Hiệu ứng 4 góc chữ L */
        .corner { position: absolute; width: 30px; height: 30px; border: 4px solid #00ff00; border-radius: 5px; }
        .top-left { top: 0; left: 0; border-right: none; border-bottom: none; }
        .top-right { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; }
        .bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; }

        /* Tia laser chạy */
        .laser { position: absolute; height: 3px; width: 100%; background: linear-gradient(90deg, transparent 0%, #00ff00 50%, transparent 100%); bottom: 0; left: 0; animation: scanning 1.5s infinite; opacity: 0.6; }
        @keyframes scanning { 0% { bottom: 100%; } 100% { bottom: 0%; } }

        /* Giao diện kết quả (Popup nhỏ) */
        #result-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 100; align-items: center; justify-content: center; }
        .popup { background: #1a1a1a; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 400px; border: 1px solid #333; }
        #qr-text { color: #00ff00; font-family: monospace; font-size: 14px; word-break: break-all; margin: 20px 0; max-height: 150px; overflow-y: auto; text-align: left; }
        .btn { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 16px; width: 100%; cursor: pointer; font-weight: bold; }
        
        .status-top { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; font-size: 13px; color: #fff; z-index: 20; white-space: nowrap;}
    </style>
</head>
<body>

    <div class="status-top" id="msg">Đang khởi động Camera...</div>
    
    <div id="reader"></div>
    
    <div class="overlay">
        <div class="scan-box">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
            <div class="laser"></div>
        </div>
    </div>
    
    <div id="result-box">
        <div class="popup">
            <h3 style="margin-top: 0; color: #fff;">ĐÃ QUÉT THÀNH CÔNG</h3>
            <div id="qr-text"></div>
            <button class="btn" onclick="copyAndClose()">ĐỒNG Ý & QUAY LẠI APP</button>
        </div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        
        const qrCodeSuccessCallback = (decodedText, decodedResult) => {
            // Khi quét trúng:
            html5QrCode.stop(); // Dừng camera
            document.getElementById('msg').innerText = "✅ ĐÃ NHẬN DIỆN!";
            document.getElementById('qr-text').innerText = decodedText;
            document.getElementById('result-box').style.display = 'flex';
            
            // Tự động copy vào bộ nhớ đệm
            navigator.clipboard.writeText(decodedText);
        };

        // CẤU HÌNH: Dùng ô vuông siêu nhỏ (150px) để ép lấy nét chuẩn xác
        const config = { 
            fps: 25, 
            qrbox: { width: 150, height: 150 },
            aspectRatio: 1.0,
            supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
        };

        // Khởi chạy camera sau (environment)
        html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
            .then(() => {
                document.getElementById('msg').innerText = "Căn cái mã QR nhỏ vào ô vuông";
            })
            .catch(err => {
                document.getElementById('msg').innerText = "Lỗi Camera: " + err;
            });

        function copyAndClose() {
            const text = document.getElementById('qr-text').innerText;
            if (window.opener) {
                // "Bắn" tin nhắn về App GAS
                window.opener.postMessage({ type: 'QR_SCAN_RESULT', data: text }, "*");
                // Tự động đóng tab
                setTimeout(function() { window.close(); }, 300);
            } else {
                alert("Đã Copy! Bạn hãy quay lại App.");
            }
        }
    </script>
</body>
</html>
