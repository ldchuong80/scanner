<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Quét QR 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #reader { width: 100%; max-width: 500px; border: none !important; }
        #result-box { width: 90%; margin-top: 20px; padding: 15px; background: #222; border-radius: 10px; display: none; border: 1px solid #444; }
        #qr-text { word-break: break-all; color: #00ff00; font-family: monospace; margin-bottom: 15px; }
        .btn { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; width: 100%; cursor: pointer; }
        .status { color: #888; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="reader"></div>
    
    <div id="result-box">
        <div style="margin-bottom: 10px; font-weight: bold;">ĐÃ TRÍCH XUẤT TEXT:</div>
        <div id="qr-text"></div>
        <button class="btn" onclick="copyAndClose()">COPY DỮ LIỆU & QUAY LẠI</button>
    </div>

    <div class="status" id="loading-msg">Đang khởi động Camera siêu nét...</div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const qrCodeSuccessCallback = (decodedText, decodedResult) => {
            // Khi quét trúng:
            html5QrCode.stop(); // Dừng camera
            document.getElementById('reader').style.display = 'none';
            document.getElementById('loading-msg').style.display = 'none';
            
            document.getElementById('qr-text').innerText = decodedText;
            document.getElementById('result-box').style.display = 'block';
            
            // Tự động copy vào bộ nhớ đệm
            navigator.clipboard.writeText(decodedText);
        };

        const config = { 
            fps: 20, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        };

        // Khởi chạy camera sau (environment)
        html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
            .then(() => {
                document.getElementById('loading-msg').innerText = "Hãy đưa mã QR vào khung vuông";
            })
            .catch(err => {
                document.getElementById('loading-msg').innerText = "Lỗi Camera: " + err;
            });

        function copyAndClose() {
            const text = document.getElementById('qr-text').innerText;
            if (window.opener) {
                // Gửi dữ liệu về App chính (GAS)
                window.opener.postMessage({ type: 'QR_SCAN_RESULT', data: text }, "*");
                window.close();
            } else {
                alert("Đã Copy! Bạn hãy quay lại App và Dán vào nhé.");
            }
        }
    </script>
</body>
</html>
